name: medical-triage-env
description: AI environment for medical triage decision making
version: 1.0

environment:
  entry_point: env.environment:MedicalTriageEnv

observation_space:
  type: object
  properties:
    patient_id:
      type: integer
    age:
      type: integer
    symptoms:
      type: array
      items:
        type: string
    heart_rate:
      type: integer
    bp:
      type: string

action_space:
  type: object
  properties:
    triage_level:
      type: string
      enum: ["low", "medium", "high", "emergency"]

reward:
  type: float
  range: [-1.0, 1.0]

tasks:
  - name: easy
    description: Basic cold symptoms
  - name: medium
    description: Fever and fatigue
  - name: hard
    description: Critical heart symptoms